apiVersion: v1
kind: Service
metadata:
  name: jenkins-service
spec:
  selector:
    app: my-jenkins      
  ports:
    - name: web
      protocol: TCP
      port: 8080         
      targetPort: 8080   
    - name: agent
      protocol: TCP
      port: 50000        
      targetPort: 50000
  type: ClusterIP        
